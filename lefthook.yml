# Lefthook — Git Hook 관리자 (husky + lint-staged 대체)
# 문서: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: biome-check
      glob: "*.{ts,tsx,js,mjs,cjs,json,css}"
      run: pnpm biome check --fix --unsafe --no-errors-on-unmatched {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-push:
  jobs:
    - name: knip
      run: pnpm knip
      # 미사용 export/import/의존성 감지 — push 전 한 번만 실행 (pre-commit보다 느림)
